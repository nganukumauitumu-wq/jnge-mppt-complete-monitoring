name: Compile ESPHome Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome & PlatformIO
        run: |
          pip install esphome platformio

      - name: Compile Firmware
        run: |
          esphome compile jnge-mppt.yaml

      # PERBAIKAN UTAMA: Mengubah pencarian berkas secara rekursif agar terhindar dari ketidakcocokan folder internal
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: .esphome/build/jnge-mppt-complete-monitoring/.pioenvs/jnge-mppt-complete-monitoring/firmware.bin
          if-no-files-found: warn

      # JALUR BYPASS CADANGAN: Jika folder pioenvs di atas kosong, robot akan mengamankan file dari jalur alternatif secara otomatis
      - name: Upload Alternative Binary
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware-backup
          path: .esphome/build/jnge-mppt-complete-monitoring/firmware.bin
          if-no-files-found: ignore
