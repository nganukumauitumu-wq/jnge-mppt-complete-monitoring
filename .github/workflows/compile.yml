name: Compile ESPHome Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome & PlatformIO
        run: |
          pip install esphome platformio

      - name: Compile Firmware
        run: |
          esphome compile jnge-mppt.yaml

      # SMART SEARCH: Automatically finds and grabs the firmware file anywhere in the build tree
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-mppt-firmware
          path: |
            .esphome/build/**/*.bin
          if-no-files-found: error
