name: Compile ESPHome Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Fix for the 2026 Node runner warning
      - name: Configure Environment
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install ESPHome & PlatformIO
        run: |
          pip install esphome platformio

      - name: Compile Firmware
        # MATCHING FIX: Points directly to your jnge-mppt.yaml file
        run: |
          esphome compile jnge-mppt.yaml

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-mppt-firmware
          path: |
            .esphome/build/**/*.bin
          if-no-files-found: error
