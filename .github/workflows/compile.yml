name: Compile ESPHome Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Node24 Environment
        run: |
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV
          echo "PLATFORMIO_DISABLE_CACHE=true" >> $GITHUB_ENV

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # TRICK SYSTEM: Automatically signs a virtual Git user to prevent terminal prompts
      - name: Configure System Git
        run: |
          sudo apt-get update && sudo apt-get install -y git
          git config --global user.email "mppt@monitoring.local"
          git config --global user.name "ESP32 Compiler"

      - name: Install ESPHome & PlatformIO Core
        run: |
          pip install --no-cache-dir --upgrade pip wheel setuptools
          pip install --no-cache-dir platformio esphome

      # DIRECT PAYLOAD INJECTION: Drops configuration directly to avoid file reading failures
      - name: Raw Compile Firmware Execution
        run: |
          cat << 'EOF' > firmware_config.yaml
          esphome:
            name: jnge-mppt-complete-monitoring

          esp32:
            board: esp32dev
            framework:
              type: arduino

          wifi:
            ssid: "QueenAraintaN"
            password: "Takonokono06"

          web_server:
            port: 80
            version: 3

          sensor:
            - platform: template
              name: "PV Input Voltage"
              id: pv_voltage
              unit_of_measurement: "V"
              accuracy_decimals: 1

            - platform: template
              name: "PV Input Current"
              id: pv_current
              unit_of_measurement: "A"
              accuracy_decimals: 1

            - platform: template
              name: "Battery Output Voltage"
              id: battery_voltage
              unit_of_measurement: "V"
              accuracy_decimals: 1

            - platform: template
              name: "Battery Output Current"
              id: battery_current
              unit_of_measurement: "A"
              accuracy_decimals: 1

            - platform: template
              name: "Total Charging Capacity"
              id: jnge_total_ah
              unit_of_measurement: "Ah"
              accuracy_decimals: 0
          EOF
          esphome compile --no-logs firmware_config.yaml

      - name: Export Output Binary Archive
        uses: actions/upload-artifact@v4
        with:
          name: esp32-mppt-firmware
          path: |
            .esphome/build/**/*.bin
          if-no-files-found: error
