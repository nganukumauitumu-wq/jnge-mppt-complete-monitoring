name: Compile ESPHome Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # TRICK SYSTEM: Creates a fake Git environment variables structure to fool PlatformIO safely
      - name: Fake Git Environment Mocking
        run: |
          sudo apt-get update && sudo apt-get install -y git
          git config --global user.email "mppt@monitoring.local"
          git config --global user.name "ESP32 Compiler"

      - name: Install ESPHome Compiler Core
        run: |
          pip install --upgrade pip
          pip install esphome platformio

      - name: Raw Compile Firmware Execution
        run: |
          esphome compile jnge-mppt.yaml

      - name: Export Output Binary Archive
        uses: actions/upload-artifact@v4
        with:
          name: esp32-mppt-firmware
          path: |
            .esphome/build/**/*.bin
          if-no-files-found: error
