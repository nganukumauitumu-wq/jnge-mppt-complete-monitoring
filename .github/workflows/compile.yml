name: Compile ESPHome Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Menggunakan v4 terbaru yang kompatibel dengan server 2026
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # PERBAIKAN: Menggunakan versi Python yang tepat

      - name: Install ESPHome
        run: |
          pip install esphome platformio

      - name: Compile Firmware
        run: |
          esphome compile jnge-mppt.yaml

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          # Jalur file biner output dari compiler internal platformio
          path: .esphome/build/jnge-mppt-complete-monitoring/.pioenvs/jnge-mppt-complete-monitoring/firmware.bin
