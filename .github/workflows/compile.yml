name: Compile ESPHome Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Runner Environment
        run: |
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV
          echo "PLATFORMIO_DISABLE_CACHE=true" >> $GITHUB_ENV

      # Using Python 3.10 for the highest stability with PlatformIO core
      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure System Git
        run: |
          sudo apt-get update && sudo apt-get install -y git
          git config --global user.email "mppt@monitoring.local"
          git config --global user.name "ESP32 Compiler"

      - name: Install ESPHome & PlatformIO Core
        run: |
          pip install --no-cache-dir --upgrade pip wheel setuptools
          pip install --no-cache-dir platformio esphome

      # FORCE INITIALIZATION: Installs the platform tools so compilation won't throw exit code 2
      - name: Pre-install ESP32 Platform Tools
        run: |
          platformio platform install espressif32

      - name: Raw Compile Firmware Execution
        run: |
          esphome compile jnge-mppt.yaml

      - name: Export Output Binary Archive
        uses: actions/upload-artifact@v4
        with:
          name: esp32-mppt-firmware
          path: |
            .esphome/build/**/*.bin
          if-no-files-found: error
